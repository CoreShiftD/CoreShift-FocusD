name: Build coreshift-foreground

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'NDK Version to use'
        required: true
        default: 'stable'
        type: choice
        options:
        - stable
        - beta

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-linux-android, armv7-linux-androideabi]

    steps:
    - uses: actions/checkout@v4

    - name: Set NDK Version
      id: ndk_setup
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          MODE="${{ github.event.inputs.ndk_version }}"
        else
          MODE="stable"
        fi

        echo "Resolving NDK via sdkmanager..."
        if [[ "$MODE" == "stable" ]]; then
          # Find latest NDK with major version 29
          PACKAGE_ID=$(sdkmanager --list | grep "ndk;" | grep " 29\." | awk '{print $1}' | sort -V | tail -n 1)
        else
          # Find latest NDK with major version 30
          PACKAGE_ID=$(sdkmanager --list | grep "ndk;" | grep " 30\." | awk '{print $1}' | sort -V | tail -n 1)
        fi
        VERSION=$(echo $PACKAGE_ID | cut -d ';' -f 2)

        if [[ -z "$VERSION" ]]; then
          echo "Error: Could not resolve NDK version for $MODE"
          exit 1
        fi

        echo "Resolved NDK Package: $PACKAGE_ID"
        echo "package_id=$PACKAGE_ID" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install NDK
      run: |
        echo "y" | sdkmanager "${{ steps.ndk_setup.outputs.package_id }}"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ steps.ndk_setup.outputs.version }}" >> $GITHUB_ENV

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build
      run: |
        cargo install cargo-ndk
        cargo ndk -t ${{ matrix.target }} build --release

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: coreshift-foreground-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/coreshift-foreground
