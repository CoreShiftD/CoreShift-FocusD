name: Build coreshift-foreground

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'NDK Version to use'
        required: true
        default: 'stable'
        type: choice
        options:
        - stable
        - beta

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-linux-android, armv7-linux-androideabi]

    steps:
    - uses: actions/checkout@v4

    - name: Set NDK Version
      id: ndk_setup
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.ndk_version }}"
        else
          VERSION="stable"
        fi

        if [[ "$VERSION" == "stable" ]]; then
          echo "ndk=r29" >> $GITHUB_OUTPUT
        else
          echo "ndk=r30" >> $GITHUB_OUTPUT
        fi

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: ${{ steps.ndk_setup.outputs.ndk }}

    - name: Build
      run: |
        cargo install cargo-ndk
        cargo ndk -t ${{ matrix.target }} build --release

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: coreshift-foreground-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/coreshift-foreground
